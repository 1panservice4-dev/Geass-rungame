
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GEASS RUN - FINAL FIXED</title>
    <style>
        body { margin: 0; background: #f0f2f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        #game-area { width: 600px; height: 350px; position: relative; background: #111; overflow: hidden; border-radius: 12px; outline:none; }
        .overlay { width: 100%; height: 100%; position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #fx-flash { position: absolute; inset: 0; background: red; opacity: 0; z-index: 200; pointer-events: none; transition: 0.3s; }
        #fx-cutin { position: absolute; width: 100%; height: 200px; top: 50%; left: 50%; transform: translate(-150%, -50%) skewX(-20deg); background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 201; opacity: 0; pointer-events: none; transition: 0.7s cubic-bezier(0.23, 1, 0.32, 1); }
        #lobby-main { background-size: cover; background-position: center; }
        #lobby-title { font-size: 50px; font-weight: 900; text-shadow: 0 0 20px red; margin-bottom: 25px; font-style: italic; }
        #lobby-select { background: rgba(0,0,0,0.95); display: none; }
        .char-card { width: 100px; padding: 15px; margin: 8px; cursor: pointer; border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); transition: 0.3s; text-align: center; }
        .char-card:hover { transform: scale(1.1); border-color: gold; }
        #game-container { width: 100%; height: 200px; border-bottom: 5px solid #222; position: relative; background: #fff; display: none; margin-top: 100px; }
        #player { width: 48px; height: 48px; position: absolute; bottom: 0; left: 50px; background-size: cover; z-index: 10; }
        .ghost { width: 48px; height: 48px; position: absolute; background-size: cover; opacity: 0.4; z-index: 9; filter: brightness(1.5) sepia(1); }
        #obstacle { width: 42px; position: absolute; bottom: 0; background-size: 100% 100%; z-index: 5; }
        @keyframes popUp { 0% { bottom: -100px; } 100% { bottom: 0px; } }
        .pop-anim { animation: popUp 0.4s ease-out forwards; }
        #ui-bar { position: absolute; top: 0; width: 100%; height: 80px; display: none; align-items: center; justify-content: space-between; padding: 0 25px; box-sizing: border-box; background: white; border-bottom: 3px solid #222; z-index: 50; }
        #skill-gauge-container { width: 150px; height: 18px; background: #eee; border-radius: 9px; border: 2px solid #222; overflow: hidden; }
        #skill-gauge { width: 0%; height: 100%; background: linear-gradient(90deg, #ffd700, #ff4500); transition: 0.1s; }
        .skill-btn { width: 80px; height: 80px; background: rgba(0,0,0,0.5); color: rgba(255, 215, 0, 0.5); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; border: 4px solid rgba(255, 215, 0, 0.5); cursor: pointer; position: absolute; bottom: 20px; left: 20px; z-index: 60; transition: 0.3s; }
        .skill-btn.ready { background: rgba(255, 215, 0, 0.7); color: black; opacity: 0.7; border-color: gold; box-shadow: 0 0 25px gold; animation: pulse 1s infinite; }
        .btn-main { padding: 15px 50px; font-size: 20px; font-weight: 900; color: white; background: #e74c3c; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .btn-sub { margin-top: 15px; padding: 10px 30px; background: none; border: 1px solid white; color: white; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(5px, 5px); } 75% { transform: translate(-5px, -5px); } }
        .shaking { animation: shake 0.1s 5; }
    </style>
</head>
<body onload="initGame()">
<div id="game-area" tabindex="0">
    <div id="fx-flash"></div><div id="fx-cutin"></div>
    <div id="lobby-main" class="overlay">
        <div id="lobby-title">GEASS RUN</div>
        <button class="btn-main" onclick="showSelect()">INITIATE ➔</button>
        <div style="margin-top:20px; font-weight:bold;">BEST: <span id="lobby-best">0</span></div>
    </div>
    <div id="lobby-select" class="overlay">
        <h2 style="color:gold;">CHOOSE YOUR GEASS</h2>
        <div id="card-container" style="display: flex;"></div>
        <button class="btn-sub" onclick="showMain()">BACK</button>
    </div>
    <div id="ui-bar">
        <div id="hp-ui" style="font-size:24px;"></div>
        <div id="score-ui" style="font-size:24px; font-weight:bold; color: #222;">0</div>
        <div id="skill-gauge-container"><div id="skill-gauge"></div></div>
    </div>
    <div id="gameover" class="overlay" style="display: none; background:rgba(0,0,0,0.9);">
        <h1 style="color:#ff4d4d; font-size:40px;">MISSION FAILED</h1>
        <div id="final-score" style="font-size:24px; margin-bottom:20px;"></div>
        <button class="btn-main" onclick="retryGame()">RETRY</button>
        <button class="btn-sub" onclick="goToLobby()">LOBBY</button>
    </div>
    <div id="m-skill-btn" class="skill-btn" onmousedown="useSkill(event)">GEASS</div>
    <div id="game-container" onmousedown="jump()">
        <div id="player"></div><div id="obstacle"></div>
    </div>
    <audio id="bgm" loop></audio>
</div>

<script>
    const base = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + '/';
    const CONFIG = {
        chars: { 'blue': base + 'R.png', 'red': base + 'OIP.png', 'purple': base + 'GZN7HXW.png', 'green': base + 'WMq4hw2.png' },
        cutins: { 'blue': base + 'images_1.jpeg', 'red': base + 'cutin_red.webp', 'purple': base + 'images_2.jpeg', 'green': base + 'cutin_green.webp' },
        lobbyBg: base + 'Lobby.jpg', obstacle: base + '샤를로켓.png', audio: base + 'Colors.mp3'
    };

    let bestScore = localStorage.getItem('geass_best_score') || 0;
    document.getElementById('lobby-best').innerText = bestScore;
    let active = false, score = 0, hp = 3, maxHp = 3, obsPos = 700, obsSpeed = 7;
    let skillType = '', skillVal = 0, baseSkillRate = 0.5, skillReady = false, charId = '';
    let isInvincible = false, isHurt = false, currentImg = '', jumpY = 0, velocityY = 0, gravity = 0.65, canDoubleJump = false;

    const area = document.getElementById('game-area'), gc = document.getElementById('game-container'),
          p = document.getElementById('player'), o = document.getElementById('obstacle'),
          bgm = document.getElementById('bgm'), mSkillBtn = document.getElementById('m-skill-btn'),
          sGauge = document.getElementById('skill-gauge'), fxFlash = document.getElementById('fx-flash'),
          fxCutin = document.getElementById('fx-cutin');

    const charData = [
        { id: 'blue', name: '무적', type: 'invincible', hp: 3, rate: 0.5, color: '#4db8ff' },
        { id: 'red', name: '파괴', type: 'destroy', hp: 2, rate: 0.8, color: '#ff4d4d' },
        { id: 'purple', name: '느리게', type: 'slow', hp: 4, rate: 0.4, color: '#9933ff' },
        { id: 'green', name: '보너스', type: 'bonus', hp: 1, rate: 1.2, color: '#2eb82e' }
    ];

    function initGame() {
        area.focus(); bgm.src = CONFIG.audio;
        document.getElementById('lobby-main').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${CONFIG.lobbyBg}')`;
        o.style.backgroundImage = `url('${CONFIG.obstacle}')`;
        const container = document.getElementById('card-container');
        container.innerHTML = '';
        charData.forEach(c => {
            const card = document.createElement('div');
            card.className = 'char-card'; card.style.background = c.color;
            card.onclick = () => { charId = c.id; skillType = c.type; maxHp = c.hp; hp = c.hp; baseSkillRate = c.rate; currentImg = CONFIG.chars[c.id]; startGame(); };
            card.innerHTML = `<img src="${CONFIG.chars[c.id]}" style="width:45px; height:45px; border-radius:50%; border:2px solid white; margin:0 auto 5px; display:block; object-fit:cover;"><b>${c.name}</b>`;
            container.appendChild(card);
        });
    }
    function showSelect() { document.getElementById('lobby-main').style.display = 'none'; document.getElementById('lobby-select').style.display = 'flex'; }
    function showMain() { document.getElementById('lobby-main').style.display = 'flex'; document.getElementById('lobby-select').style.display = 'none'; }
    function startGame() {
        p.style.backgroundImage = `url('${currentImg}')`;
        document.getElementById('lobby-select').style.display = 'none';
        document.getElementById('ui-bar').style.display = 'flex';
        gc.style.display = 'block'; mSkillBtn.style.display = 'flex';
        score = 0; obsPos = 700; obsSpeed = 7; skillVal = 0; skillReady = false;
        jumpY = 0; velocityY = 0; active = true; isInvincible = false; isHurt = false;
        bgm.currentTime = 0; bgm.play().catch(()=>{});
        area.focus(); resetObstacle(); requestAnimationFrame(loop);
    }
    function resetObstacle() { obsPos = 700; o.style.height = (Math.random() > 0.5) ? '85px' : '45px'; o.classList.remove('pop-anim'); void o.offsetWidth; o.classList.add('pop-anim'); }
    function jump() { if (jumpY === 0) { velocityY = -13; canDoubleJump = true; } else if (canDoubleJump) { velocityY = -11; canDoubleJump = false; createGhost(); } }
    function createGhost() {
        const ghost = document.createElement('div');
        ghost.className = 'ghost'; ghost.style.backgroundImage = `url('${currentImg}')`;
        ghost.style.left = p.offsetLeft + 'px'; ghost.style.bottom = p.style.bottom;
        gc.appendChild(ghost); setTimeout(() => ghost.remove(), 400);
    }
    function useSkill(e) {
        if (e) e.stopPropagation();
        if (!skillReady || !active) return;
        skillReady = false; skillVal = 0; mSkillBtn.classList.remove('ready');
        fxFlash.style.transition = 'none'; fxFlash.style.opacity = '0.7';
        void fxFlash.offsetWidth; fxFlash.style.transition = '0.5s'; fxFlash.style.opacity = '0';
        fxCutin.style.backgroundImage = `url('${CONFIG.cutins[charId]}')`;
        fxCutin.style.transform = 'translate(-50%, -50%) skewX(-20deg)'; fxCutin.style.opacity = '1';
        setTimeout(() => { fxCutin.style.transform = 'translate(150%, -50%) skewX(-20deg)'; fxCutin.style.opacity = '0'; }, 800);
        if (skillType === 'invincible') { isInvincible = true; p.style.boxShadow = "0 0 25px gold"; setTimeout(() => { isInvincible = false; p.style.boxShadow = "none"; }, 4000); }
        else if (skillType === 'destroy') { area.classList.add('shaking'); resetObstacle(); score += 5; setTimeout(() => area.classList.remove('shaking'), 500); }
        else if (skillType === 'slow') { let s = obsSpeed; obsSpeed = 3; gc.style.filter = "sepia(1) hue-rotate(240deg)"; setTimeout(() => { obsSpeed = s; gc.style.filter = "none"; }, 5000); }
        else if (skillType === 'bonus') { score += 20; }
    }
    function loop() {
        if (!active) return;
        velocityY += gravity; jumpY += velocityY;
        if (jumpY > 0) { jumpY = 0; velocityY = 0; }
        p.style.bottom = (-jumpY) + 'px';
        if (!skillReady) {
            let rate = baseSkillRate * (1 + (maxHp - hp) * 0.4);
            skillVal = Math.min(100, skillVal + rate);
            if (skillVal >= 100) { skillReady = true; mSkillBtn.classList.add('ready'); }
        }
        sGauge.style.width = skillVal + '%';
        obsPos -= obsSpeed;
        if (obsPos < -60) { score++; obsSpeed += 0.12; resetObstacle(); }
        o.style.left = obsPos + 'px';
        let pr = p.getBoundingClientRect(), or = o.getBoundingClientRect();
        if (!isInvincible && !isHurt && pr.right > or.left+12 && pr.left < or.right-12 && pr.bottom > or.top+12) {
            hp--;
            if (hp <= 0) {
                active = false; bgm.pause();
                if (score > bestScore) { bestScore = score; localStorage.setItem('geass_best_score', score); document.getElementById('lobby-best').innerText = score; }
                document.getElementById('final-score').innerText = "SCORE: " + score;
                document.getElementById('gameover').style.display = 'flex';
            } else { isHurt = true; p.style.opacity = '0.3'; setTimeout(()=>{ p.style.opacity = '1'; isHurt = false; }, 1200); resetObstacle(); }
        }
        document.getElementById('hp-ui').innerText = "❤️".repeat(Math.max(0, hp));
        document.getElementById('score-ui').innerText = score;
        requestAnimationFrame(loop);
    }
    function goToLobby() {
        active = false; bgm.pause(); document.getElementById('gameover').style.display = 'none';
        gc.style.display = 'none'; document.getElementById('ui-bar').style.display = 'none';
        document.getElementById('m-skill-btn').style.display = 'none'; showMain();
    }
    area.onkeydown = (e) => { if (e.code === 'Space') { e.preventDefault(); jump(); } if (e.code === 'Enter') { e.preventDefault(); useSkill(); } };
    function retryGame() { document.getElementById('gameover').style.display = 'none'; startGame(); }
</script>
</body>
</html>
