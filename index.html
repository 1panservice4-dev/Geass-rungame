
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GEASS RUN - Ultimate Edition</title>
    <style>
        :root { --st-bg: #f0f2f6; --st-accent: #ff4b4b; }
        body { margin: 0; background: var(--st-bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        
        #main-wrapper { width: 95%; max-width: 700px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        #game-area { width: 100%; height: 350px; background: #000; position: relative; overflow: hidden; border-radius: 10px; outline: none; }
        
        /* 컷인 (노란줄 제거) */
        #fx-cutin { position: absolute; width: 150%; height: 100%; top: 50%; left: 50%; transform: translate(-150%, -50%) skewX(-20deg); 
                     background-size: cover; background-position: center; z-index: 201; opacity: 0; transition: 0.4s ease-out; pointer-events: none; }
        #fx-flash { position: absolute; inset: 0; background: white; opacity: 0; z-index: 200; pointer-events: none; }

        /* UI 및 오버레이 */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; background: rgba(0,0,0,0.7); }
        #lobby-main { background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('Robby') center/cover; }
        #ui-bar { position: absolute; top: 0; width: 100%; height: 50px; background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 50; border-bottom: 2px solid #333; }
        
        /* 스킬 게이지 */
        #skill-container { width: 100px; height: 10px; background: #ddd; border-radius: 5px; overflow: hidden; border: 1px solid #333; }
        #skill-gauge { width: 0%; height: 100%; background: linear-gradient(90deg, #ff4b4b, #ffcc00); transition: 0.2s; }

        /* 인게임 오브젝트 */
        #game-container { width: 100%; height: 200px; background: white; display: none; position: relative; margin-top: 80px; transition: transform 0.1s; }
        #player { width: 50px; height: 50px; position: absolute; bottom: 0; left: 50px; background-size: contain; background-repeat: no-repeat; z-index: 10; }
        #obstacle { width: 40px; height: 40px; position: absolute; bottom: 0; background: url('샤를 로켓.png') center/cover; z-index: 5; }

        /* 모바일 컨트롤 버튼 */
        #mobile-controls { display: none; justify-content: space-between; margin-top: 15px; gap: 10px; }
        .ctrl-btn { flex: 1; padding: 20px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        #btn-jump { background: #333; }
        #btn-skill { background: var(--st-accent); }
        
        @media (max-width: 600px) { #mobile-controls { display: flex; } #game-area { height: 300px; } }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="game-area" tabindex="0">
        <div id="fx-flash"></div>
        <div id="fx-cutin"></div>
        
        <div id="lobby-main" class="overlay">
            <h2 style="font-size: 28px; text-shadow: 0 0 10px red;">ALL HAIL LELOUCH</h2>
            <button style="padding: 12px 24px; background: red; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="showSelect()">START MISSION</button>
        </div>

        <div id="lobby-select" class="overlay" style="display:none; background: #111;">
            <h3>SELECT GEASS</h3>
            <div id="card-container" style="display:flex; flex-wrap: wrap; justify-content: center;"></div>
        </div>

        <div id="ui-bar">
            <div id="hp-ui"></div>
            <div id="score-ui" style="font-weight:bold; font-size: 20px;">0</div>
            <div id="skill-container"><div id="skill-gauge"></div></div>
        </div>

        <div id="gameover" class="overlay" style="display:none;">
            <h2 style="color:red;">MISSION FAILED</h2>
            <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer;">RETRY</button>
        </div>

        <div id="game-container">
            <div id="player"></div>
            <div id="obstacle"></div>
        </div>
        <audio id="bgm" loop src="Colors.mp3"></audio>
    </div>

    <div id="mobile-controls">
        <button id="btn-jump" class="ctrl-btn">JUMP</button>
        <button id="btn-skill" class="ctrl-btn">GEASS</button>
    </div>
    <p style="font-size: 12px; color: #888; margin-top: 10px;">PC: Space(점프/더블), Q/Enter(스킬) | Mobile: 하단 버튼</p>
</div>

<script>
    const FILE_MAP = {"blue": "R.png", "red": "OIP.png", "purple": "GZN7HXW.png", "green": "WMq4hw2.png", "cutin_blue": "Blue cutin", "cutin_red": "Red cutin", "cutin_purple": "Purple cutin", "cutin_green": "Green cutin", "obs": "\uc0e4\ub97c \ub85c\ucf13.png", "lobby": "Robby", "bgm": "Colors.mp3"};
    const chars = [
        { id: 'blue', name: '절대방어', hp: 3, color: '#0066ff' },
        { id: 'red', name: '공간파괴', hp: 2, color: '#cc0000' },
        { id: 'purple', name: '시간정지', hp: 4, color: '#6600cc' },
        { id: 'green', name: '절대행운', hp: 1, color: '#008000' }
    ];

    let active = false, score = 0, hp = 1, maxHp = 1, obsPos = 800, obsSpeed = 8;
    let jumpY = 0, velocityY = 0, gravity = 0.7, jumpCount = 0;
    let skillGauge = 0, skillReady = false, isInvincible = false, charId = '';

    function showSelect() {
        document.getElementById('lobby-main').style.display = 'none';
        const select = document.getElementById('lobby-select');
        select.style.display = 'flex';
        const container = document.getElementById('card-container');
        container.innerHTML = "";
        chars.forEach(c => {
            const card = document.createElement('div');
            card.style = `width:80px; padding:15px; margin:5px; background:${c.color}; border-radius:10px; cursor:pointer; font-size:13px;`;
            card.innerHTML = `<b>${c.name}</b><br>HP: ${c.hp}`;
            card.onclick = () => { charId = c.id; maxHp = c.hp; hp = c.hp; startGame(); };
            container.appendChild(card);
        });
    }

    function startGame() {
        document.getElementById('lobby-select').style.display = 'none';
        document.getElementById('ui-bar').style.display = 'flex';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('player').style.backgroundImage = `url(${FILE_MAP[charId]})`;
        active = true; updateHP(); document.getElementById('bgm').play();
        document.getElementById('game-area').focus();
        loop();
    }

    function updateHP() { document.getElementById('hp-ui').innerText = "🔴".repeat(hp); }

    function jump() { if(active && jumpCount < 2) { velocityY = -12; jumpCount++; } }

    function useSkill() {
        if (!skillReady || !active) return;
        skillReady = false; skillGauge = 0;
        document.getElementById('skill-gauge').style.width = '0%';
        
        const cutin = document.getElementById('fx-cutin');
        cutin.style.backgroundImage = `url(${FILE_MAP['cutin_'+charId]})`;
        cutin.style.opacity = '1'; cutin.style.transform = 'translate(-50%, -50%) skewX(-20deg)';
        
        setTimeout(() => {
            cutin.style.opacity = '0'; cutin.style.transform = 'translate(150%, -50%) skewX(-20deg)';
            if(charId === 'blue') { 
                isInvincible = true; document.getElementById('player').style.filter = 'drop-shadow(0 0 10px gold) brightness(1.2)';
                setTimeout(() => { isInvincible = false; document.getElementById('player').style.filter = ''; }, 5000);
            } else if(charId === 'red') { obsPos = 900; score += 5; flash('white'); }
            else if(charId === 'purple') { const s = obsSpeed; obsSpeed = 3; setTimeout(()=>{obsSpeed=s;}, 5000); }
            else if(charId === 'green') { score += 20; flash('gold'); }
            setTimeout(() => cutin.style.transform = 'translate(-150%, -50%) skewX(-20deg)', 500);
        }, 800);
    }

    function flash(color) {
        const f = document.getElementById('fx-flash');
        f.style.backgroundColor = color; f.style.opacity = '0.5';
        setTimeout(() => f.style.opacity = '0', 300);
    }

    function loop() {
        if(!active) return;
        velocityY += gravity; jumpY += velocityY;
        if(jumpY > 0) { jumpY = 0; velocityY = 0; jumpCount = 0; }
        document.getElementById('player').style.bottom = (-jumpY) + 'px';

        obsPos -= obsSpeed;
        if(obsPos < -50) {
            obsPos = 800; score++; obsSpeed += 0.1;
            // 목숨 스킬쿨 반비례: HP가 적을수록 더 많이 충전됨
            let chargeAmount = 25 + ( (maxHp - hp) * 15 ); 
            if(skillGauge < 100) {
                skillGauge = Math.min(100, skillGauge + chargeAmount);
                document.getElementById('skill-gauge').style.width = skillGauge + '%';
                if(skillGauge === 100) skillReady = true;
            }
        }
        document.getElementById('obstacle').style.left = obsPos + 'px';
        document.getElementById('score-ui').innerText = score;

        const p = document.getElementById('player').getBoundingClientRect();
        const o = document.getElementById('obstacle').getBoundingClientRect();
        if(!isInvincible && p.right > o.left+10 && p.left < o.right-10 && p.bottom > o.top+10) {
            hp--; updateHP(); obsPos = 900; flash('red');
            document.getElementById('game-container').style.transform = 'translateX(10px)';
            setTimeout(()=>document.getElementById('game-container').style.transform='', 100);
            if(hp <= 0) { active = false; document.getElementById('gameover').style.display='flex'; }
        }
        requestAnimationFrame(loop);
    }

    // 입력 처리
    window.addEventListener('keydown', e => {
        if(e.code === 'Space') jump();
        if(e.code === 'Enter' || e.key.toLowerCase() === 'q') useSkill();
    });
    document.getElementById('btn-jump').addEventListener('touchstart', e => { e.preventDefault(); jump(); });
    document.getElementById('btn-skill').addEventListener('touchstart', e => { e.preventDefault(); useSkill(); });
    document.getElementById('btn-jump').addEventListener('mousedown', jump);
    document.getElementById('btn-skill').addEventListener('mousedown', useSkill);
</script>
</body>
</html>
