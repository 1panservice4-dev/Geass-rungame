
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEASS RUN - Streamlit Edition</title>
    <style>
        :root { --st-bg: #ffffff; --st-sidebar: #f0f2f6; --st-text: #31333F; --st-accent: #ff4b4b; }
        body { margin: 0; font-family: sans-serif; background-color: var(--st-sidebar); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Streamlit 컨테이너 스타일 */
        #main-wrapper { width: 700px; background: var(--st-bg); padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        header { border-bottom: 1px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { color: var(--st-text); font-size: 2rem; margin: 0; display: flex; align-items: center; gap: 10px; }

        /* 게임 실행 영역 */
        #game-area { width: 100%; height: 400px; position: relative; background: #000; border-radius: 10px; overflow: hidden; outline: none; }
        
        /* 효과 레이어 */
        #fx-flash { position: absolute; inset: 0; background: red; opacity: 0; z-index: 200; pointer-events: none; }
        #fx-cutin { position: absolute; width: 130%; height: 260px; top: 50%; left: 50%; transform: translate(-150%, -50%) skewX(-20deg); 
                     background-size: cover; background-position: center; z-index: 201; opacity: 0; border: 8px solid gold; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        
        /* 오버레이 (로비, 선택, 종료) */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; }
        #lobby-main { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('Robby') center/cover; }
        #lobby-select { background: rgba(0,0,0,0.9); display: none; }
        
        /* Streamlit 스타일 버튼 */
        .stButton { background: var(--st-accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .stButton:hover { background: #e04545; transform: translateY(-2px); }
        
        .char-card { width: 100px; padding: 15px; margin: 8px; border-radius: 12px; border: 2px solid #444; cursor: pointer; transition: 0.3s; }
        .char-card:hover { transform: scale(1.1); border-color: gold; box-shadow: 0 0 15px gold; }

        /* 인게임 UI */
        #ui-bar { position: absolute; top: 0; width: 100%; height: 70px; display: none; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; background: white; border-bottom: 3px solid #333; z-index: 50; color: #333; }
        #skill-gauge-container { width: 140px; height: 16px; background: #eee; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        #skill-gauge { width: 0%; height: 100%; background: linear-gradient(90deg, #ff4b4b, #ffcc00); transition: 0.1s; }

        /* 인게임 오브젝트 */
        #game-container { width: 100%; height: 230px; position: relative; background: #fff; display: none; margin-top: 90px; transition: 0.1s; }
        #player { width: 50px; height: 50px; position: absolute; bottom: 0; left: 60px; background-size: contain; background-repeat: no-repeat; z-index: 10; }
        #obstacle { width: 45px; height: 45px; position: absolute; bottom: 0; background: url('샤를 로켓.png') center/cover; z-index: 5; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <header>
        <h1>👁️ GEASS RUN</h1>
    </header>

    <div id="game-area" tabindex="0">
        <div id="fx-flash"></div>
        <div id="fx-cutin"></div>

        <div id="lobby-main" class="overlay">
            <h2 style="font-size:40px; margin-bottom:20px; text-shadow: 0 0 15px red;">ALL HAIL LELOUCH</h2>
            <button class="stButton" onclick="showSelect()">INITIATE STRATEGY</button>
        </div>

        <div id="lobby-select" class="overlay">
            <h3>SELECT YOUR GEASS</h3>
            <div style="display: flex;" id="card-container"></div>
        </div>

        <div id="ui-bar">
            <div id="hp-ui" style="font-size:24px;"></div>
            <div id="score-ui" style="font-size:24px; font-weight:900;">0</div>
            <div id="skill-gauge-container"><div id="skill-gauge"></div></div>
        </div>

        <div id="gameover" class="overlay" style="display:none; background:rgba(0,0,0,0.85);">
            <h1 style="color:red;">MISSION FAILED</h1>
            <button class="stButton" onclick="location.reload()">RE-STRATEGIZE</button>
        </div>

        <div id="game-container">
            <div id="player"></div>
            <div id="obstacle"></div>
        </div>

        <audio id="bgm" loop src="Colors.mp3"></audio>
    </div>
    
    <p style="margin-top:15px; color:#666; font-size:0.9rem;">[Space]: 점프 | [Enter/Q]: 기아스 발동</p>
</div>

<script>
    const IMGS = { 'blue': 'R.png', 'red': 'OIP.png', 'purple': 'GZN7HXW.png', 'green': 'WMq4hw2.png' };
    const CUTINS = { 'blue': 'images_1.jpeg', 'red': 'cutin_red.we', 'purple': 'images_2.jpeg', 'green': 'cutin_green.webp' };
    
    let active = false, score = 0, hp = 3, maxHp = 3, obsPos = 700, obsSpeed = 8;
    let skillGauge = 0, skillReady = false, isInvincible = false, charId = '';
    let jumpY = 0, velocityY = 0, gravity = 0.7;

    const gameArea = document.getElementById('game-area');
    const p = document.getElementById('player'), o = document.getElementById('obstacle'), gCont = document.getElementById('game-container');
    const bgm = document.getElementById('bgm'), sGauge = document.getElementById('skill-gauge');

    const chars = [
        { id: 'blue', name: '절대방어', type: 'invincible', hp: 3, color: '#0066ff' },
        { id: 'red', name: '붕괴', type: 'destroy', hp: 2, color: '#cc0000' },
        { id: 'purple', name: '정지', type: 'slow', hp: 4, color: '#6600cc' },
        { id: 'green', name: '행운', type: 'bonus', hp: 1, color: '#008000' }
    ];

    function showSelect() {
        document.getElementById('lobby-main').style.display = 'none';
        document.getElementById('lobby-select').style.display = 'flex';
        const container = document.getElementById('card-container');
        if(container.innerHTML === "") {
            chars.forEach(c => {
                const card = document.createElement('div');
                card.className = 'char-card'; card.style.background = c.color;
                card.onclick = () => { charId = c.id; maxHp = c.hp; startGame(); };
                card.innerHTML = `<b>${c.name}</b><br><small>HP: ${c.hp}</small>`;
                container.appendChild(card);
            });
        }
    }

    function startGame() {
        document.getElementById('lobby-select').style.display = 'none';
        document.getElementById('ui-bar').style.display = 'flex';
        gCont.style.display = 'block';
        p.style.backgroundImage = `url(${IMGS[charId]})`;
        hp = maxHp; updateHP();
        active = true; bgm.play(); gameArea.focus();
        loop();
    }

    function updateHP() { document.getElementById('hp-ui').innerText = "🔴".repeat(hp); }
    function jump() { if(jumpY === 0 && active) velocityY = -14; }

    function useSkill() {
        if(!skillReady || !active) return;
        skillReady = false; skillGauge = 0; sGauge.style.width = '0%';
        
        const cutin = document.getElementById('fx-cutin');
        cutin.style.backgroundImage = `url(${CUTINS[charId]})`;
        cutin.style.opacity = '1'; cutin.style.transform = 'translate(-50%, -50%) skewX(-20deg)';
        
        setTimeout(() => {
            cutin.style.opacity = '0'; cutin.style.transform = 'translate(100%, -50%) skewX(-20deg)';
            setTimeout(() => cutin.style.transform = 'translate(-150%, -50%) skewX(-20deg)', 600);
            
            if(charId === 'blue') { 
                isInvincible = true; p.style.filter = 'drop-shadow(0 0 10px gold)';
                setTimeout(() => { isInvincible = false; p.style.filter = ''; }, 4000);
            } else if(charId === 'red') { obsPos = 700; score += 5; flash('white'); }
            else if(charId === 'purple') { const s = obsSpeed; obsSpeed = 3; setTimeout(() => obsSpeed = s, 5000); }
            else if(charId === 'green') { score += 20; flash('gold'); }
        }, 800);
    }

    function flash(color) {
        const f = document.getElementById('fx-flash');
        f.style.background = color; f.style.opacity = '0.5';
        setTimeout(() => f.style.opacity = '0', 300);
    }

    function loop() {
        if(!active) return;
        velocityY += gravity; jumpY += velocityY;
        if(jumpY > 0) { jumpY = 0; velocityY = 0; }
        p.style.bottom = (-jumpY) + 'px';
        
        obsPos -= obsSpeed;
        if(obsPos < -60) { 
            obsPos = 700; score++; obsSpeed += 0.12;
            if(skillGauge < 100) { skillGauge += 25; if(skillGauge > 100) skillGauge = 100; sGauge.style.width = skillGauge + '%'; if(skillGauge === 100) skillReady = true; }
        }
        o.style.left = obsPos + 'px';
        
        const pRect = p.getBoundingClientRect(), oRect = o.getBoundingClientRect();
        if(!isInvincible && pRect.right > oRect.left + 12 && pRect.left < oRect.right - 12 && pRect.bottom > oRect.top + 12) {
            hp--; updateHP(); obsPos = 700; flash('red');
            gCont.style.transform = 'translateX(10px)'; setTimeout(()=>gCont.style.transform='', 50);
            if(hp <= 0) { active = false; document.getElementById('gameover').style.display = 'flex'; bgm.pause(); }
        }
        document.getElementById('score-ui').innerText = score;
        requestAnimationFrame(loop);
    }

    gameArea.onkeydown = (e) => {
        if(e.code === 'Space') jump();
        if(e.code === 'Enter' || e.key === 'q' || e.key === 'Q') useSkill();
    };
</script>
</body>
</html>
