
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GEASS RUN - Power Up</title>
    <style>
        :root { --st-bg: #f0f2f6; --st-accent: #ff4b4b; }
        body { margin: 0; background: var(--st-bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        
        #main-wrapper { width: 95%; max-width: 700px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        #game-area { width: 100%; height: 350px; background: #000; position: relative; overflow: hidden; border-radius: 10px; outline: none; }
        
        /* 컷인 연출 (노란 테두리 제거 및 그림자 효과) */
        #fx-cutin { position: absolute; width: 140%; height: 100%; top: 50%; left: 50%; transform: translate(-150%, -50%) skewX(-20deg); 
                     background-size: cover; background-position: center; z-index: 201; opacity: 0; transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1); pointer-events: none;
                     box-shadow: 0 0 50px rgba(255,0,0,0.5); }
        
        /* 스킬 발동 시 화면 효과 */
        #fx-flash { position: absolute; inset: 0; background: white; opacity: 0; z-index: 200; pointer-events: none; }
        .screen-shake { animation: shake 0.3s; }
        @keyframes shake {
            0% { transform: translate(0,0); } 25% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 75% { transform: translate(5px, -5px); } 100% { transform: translate(0,0); }
        }

        /* UI */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; background: rgba(0,0,0,0.7); }
        #lobby-main { background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('Robby') center/cover; }
        #ui-bar { position: absolute; top: 0; width: 100%; height: 50px; background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 50; border-bottom: 2px solid #333; }
        
        /* 스킬 게이지 (충전 시 반짝임) */
        #skill-container { width: 120px; height: 14px; background: #ddd; border-radius: 7px; overflow: hidden; border: 2px solid #333; }
        #skill-gauge { width: 0%; height: 100%; background: linear-gradient(90deg, #ff4b4b, #ffcc00); transition: 0.2s; }
        .gauge-full { box-shadow: 0 0 10px #ff4b4b; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        #game-container { width: 100%; height: 200px; background: white; display: none; position: relative; margin-top: 80px; }
        #player { width: 50px; height: 50px; position: absolute; bottom: 0; left: 50px; background-size: contain; background-repeat: no-repeat; z-index: 10; transition: 0.2s; }
        #obstacle { width: 40px; height: 40px; position: absolute; bottom: 0; background: url('샤를 로켓.png') center/cover; z-index: 5; }

        /* 모바일 조작 */
        #mobile-controls { display: none; justify-content: space-between; margin-top: 15px; gap: 10px; }
        .ctrl-btn { flex: 1; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; user-select: none; }
        #btn-jump { background: #333; }
        #btn-skill { background: var(--st-accent); }
        @media (max-width: 600px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="game-area" tabindex="0">
        <div id="fx-flash"></div>
        <div id="fx-cutin"></div>
        
        <div id="lobby-main" class="overlay">
            <h2 style="font-size: 30px; text-shadow: 0 0 15px red;">GEASS RUN</h2>
            <button style="padding: 15px 30px; background: red; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="showSelect()">STRATEGY START</button>
        </div>

        <div id="lobby-select" class="overlay" style="display:none; background: #111;">
            <h3>SELECT YOUR GEASS</h3>
            <div id="card-container" style="display:flex; flex-wrap: wrap; justify-content: center;"></div>
        </div>

        <div id="ui-bar">
            <div id="hp-ui" style="font-size: 18px;"></div>
            <div id="score-ui" style="font-weight:900; font-size: 24px;">0</div>
            <div id="skill-container"><div id="skill-gauge"></div></div>
        </div>

        <div id="gameover" class="overlay" style="display:none;">
            <h1 style="color:red; margin:0;">MISSION FAILED</h1>
            <p id="final-score" style="margin: 10px 0;"></p>
            <button onclick="location.reload()" style="padding:10px 25px; border-radius:5px; cursor:pointer;">RE-DEPLOY</button>
        </div>

        <div id="game-container">
            <div id="player"></div>
            <div id="obstacle"></div>
        </div>
        <audio id="bgm" loop src="Colors.mp3"></audio>
    </div>

    <div id="mobile-controls">
        <button id="btn-jump" class="ctrl-btn">JUMP / DOUBLE</button>
        <button id="btn-skill" class="ctrl-btn">GEASS</button>
    </div>
</div>

<script>
    const FILE_MAP = {"blue": "R.png", "red": "OIP.png", "purple": "GZN7HXW.png", "green": "WMq4hw2.png", "cutin_blue": "images_1.jpeg", "cutin_red": "Red cutin.jpeg", "cutin_purple": "images_2.jpeg", "cutin_green": "Green cutin.jpeg", "obs": "\uc0e4\ub97c \ub85c\ucf13.png", "lobby": "Robby", "bgm": "Colors.mp3"};
    const chars = [
        { id: 'blue', name: '절대방어', hp: 3, color: '#0066ff' },
        { id: 'red', name: '공간파괴', hp: 2, color: '#cc0000' },
        { id: 'purple', name: '시간정지', hp: 4, color: '#6600cc' },
        { id: 'green', name: '절대행운', hp: 1, color: '#008000' }
    ];

    let active = false, score = 0, hp = 1, maxHp = 1, obsPos = 800, obsSpeed = 8;
    let jumpY = 0, velocityY = 0, gravity = 0.7, jumpCount = 0, charId = '';
    let skillGauge = 0, skillReady = false, isInvincible = false;

    function showSelect() {
        document.getElementById('lobby-main').style.display = 'none';
        document.getElementById('lobby-select').style.display = 'flex';
        const container = document.getElementById('card-container');
        container.innerHTML = "";
        chars.forEach(c => {
            const card = document.createElement('div');
            card.style = `width:90px; padding:15px; margin:8px; background:${c.color}; border-radius:12px; cursor:pointer;`;
            card.innerHTML = `<b>${c.name}</b><br><small>HP: ${c.hp}</small>`;
            card.onclick = () => { charId = c.id; maxHp = c.hp; hp = c.hp; startGame(); };
            container.appendChild(card);
        });
    }

    function startGame() {
        document.getElementById('lobby-select').style.display = 'none';
        document.getElementById('ui-bar').style.display = 'flex';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('player').style.backgroundImage = `url(${FILE_MAP[charId]})`;
        active = true; updateHP(); 
        document.getElementById('bgm').play().catch(()=>{});
        document.getElementById('game-area').focus();
        loop();
    }

    function updateHP() { document.getElementById('hp-ui').innerText = "🔴".repeat(hp); }

    function jump() { if(active && jumpCount < 2) { velocityY = -12; jumpCount++; } }

    function useSkill() {
        if (!skillReady || !active) return;
        skillReady = false; skillGauge = 0;
        document.getElementById('skill-gauge').style.width = '0%';
        document.getElementById('skill-container').classList.remove('gauge-full');

        // 1. 화면 흔들림 및 반전 효과
        document.getElementById('game-area').classList.add('screen-shake');
        setTimeout(() => document.getElementById('game-area').classList.remove('screen-shake'), 300);
        flash('rgba(255,0,0,0.3)');

        // 2. 컷인 연출 (노란 줄 없음)
        const cutin = document.getElementById('fx-cutin');
        cutin.style.backgroundImage = `url(${FILE_MAP['cutin_'+charId]})`;
        cutin.style.opacity = '1'; cutin.style.transform = 'translate(-50%, -50%) skewX(-20deg)';
        
        setTimeout(() => {
            cutin.style.opacity = '0';
            cutin.style.transform = 'translate(150%, -50%) skewX(-20deg)';
            
            // 3. 실제 능력 적용
            if(charId === 'blue') { 
                isInvincible = true; 
                document.getElementById('player').style.filter = 'drop-shadow(0 0 20px gold) invert(0.2)';
                setTimeout(() => { isInvincible = false; document.getElementById('player').style.filter = ''; }, 6000);
            } else if(charId === 'red') { 
                obsPos = 900; score += 7; flash('white'); 
            } else if(charId === 'purple') { 
                const s = obsSpeed; obsSpeed = 2.5; 
                document.getElementById('game-container').style.filter = 'sepia(1) hue-rotate(200deg)';
                setTimeout(()=>{ obsSpeed=s; document.getElementById('game-container').style.filter=''; }, 6000);
            } else if(charId === 'green') { 
                score += 25; flash('gold'); 
            }
            
            setTimeout(() => cutin.style.transform = 'translate(-150%, -50%) skewX(-20deg)', 500);
        }, 800);
    }

    function flash(color) {
        const f = document.getElementById('fx-flash');
        f.style.backgroundColor = color; f.style.opacity = '0.7';
        setTimeout(() => f.style.opacity = '0', 400);
    }

    function loop() {
        if(!active) return;
        velocityY += gravity; jumpY += velocityY;
        if(jumpY > 0) { jumpY = 0; velocityY = 0; jumpCount = 0; }
        document.getElementById('player').style.bottom = (-jumpY) + 'px';

        obsPos -= obsSpeed;
        if(obsPos < -50) {
            obsPos = 800; score++; obsSpeed += 0.12;
            
            // 목숨 반비례 스킬 충전 로직 (HP가 낮을수록 최대 2배 빠르게 충전)
            let chargeMultiplier = 1 + (maxHp - hp) * 0.5;
            if(skillGauge < 100) {
                skillGauge = Math.min(100, skillGauge + (20 * chargeMultiplier));
                document.getElementById('skill-gauge').style.width = skillGauge + '%';
                if(skillGauge === 100) {
                    skillReady = true;
                    document.getElementById('skill-container').classList.add('gauge-full');
                }
            }
        }
        document.getElementById('obstacle').style.left = obsPos + 'px';
        document.getElementById('score-ui').innerText = score;

        const p = document.getElementById('player').getBoundingClientRect();
        const o = document.getElementById('obstacle').getBoundingClientRect();
        if(!isInvincible && p.right > o.left+12 && p.left < o.right-12 && p.bottom > o.top+12) {
            hp--; updateHP(); obsPos = 950; flash('rgba(255,0,0,0.5)');
            if(hp <= 0) { 
                active = false; 
                document.getElementById('gameover').style.display='flex';
                document.getElementById('final-score').innerText = "SCORE: " + score;
            }
        }
        requestAnimationFrame(loop);
    }

    // 컨트롤 이벤트
    window.addEventListener('keydown', e => {
        if(e.code === 'Space') { e.preventDefault(); jump(); }
        if(e.code === 'Enter' || e.key.toLowerCase() === 'q') useSkill();
    });
    const jBtn = document.getElementById('btn-jump'), sBtn = document.getElementById('btn-skill');
    const handleTouch = (fn) => (e) => { e.preventDefault(); fn(); };
    jBtn.addEventListener('touchstart', handleTouch(jump));
    sBtn.addEventListener('touchstart', handleTouch(useSkill));
    jBtn.addEventListener('mousedown', jump);
    sBtn.addEventListener('mousedown', useSkill);
</script>
</body>
</html>
